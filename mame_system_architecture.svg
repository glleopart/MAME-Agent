<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 3; }

  /* Purple ramp */
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  /* Teal ramp */
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Coral ramp */
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  /* Blue ramp */
  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  /* Amber ramp */
  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 1: Desktop UI -->
<g class="c-purple">
  <rect x="40" y="30" width="600" height="100" rx="16" stroke-width="0.5"/>
  <text class="th" x="340" y="55" text-anchor="middle">Electron desktop shell</text>
</g>
<g class="c-purple">
  <rect x="60" y="70" width="200" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="160" y="92" text-anchor="middle" dominant-baseline="central">Chat panel (React)</text>
</g>
<g class="c-purple">
  <rect x="280" y="70" width="200" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="380" y="92" text-anchor="middle" dominant-baseline="central">Document viewer</text>
</g>
<g class="c-purple">
  <rect x="500" y="70" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="560" y="92" text-anchor="middle" dominant-baseline="central">Settings / i18n</text>
</g>

<!-- Arrow: UI to Agent -->
<line x1="340" y1="130" x2="340" y2="170" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="155" text-anchor="start">IPC</text>

<!-- Layer 2: Mastra Agent Core -->
<g class="c-teal">
  <rect x="40" y="170" width="600" height="110" rx="16" stroke-width="0.5"/>
  <text class="th" x="340" y="195" text-anchor="middle">Mastra agent core (TypeScript)</text>
</g>
<g class="c-teal">
  <rect x="60" y="210" width="150" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="135" y="232" text-anchor="middle" dominant-baseline="central">LLM reasoning</text>
</g>
<g class="c-teal">
  <rect x="230" y="210" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="295" y="232" text-anchor="middle" dominant-baseline="central">Thread memory</text>
</g>
<g class="c-teal">
  <rect x="380" y="210" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="440" y="232" text-anchor="middle" dominant-baseline="central">RAG pipeline</text>
</g>
<g class="c-teal">
  <rect x="520" y="210" width="100" height="44" rx="8" stroke-width="0.5"/>
  <text class="ts" x="570" y="232" text-anchor="middle" dominant-baseline="central">Workflows</text>
</g>

<!-- Arrow: Agent to Tools -->
<line x1="340" y1="280" x2="340" y2="320" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="305" text-anchor="start">Tool calls</text>

<!-- Layer 3: Tool Layer -->
<g class="c-coral">
  <rect x="40" y="320" width="600" height="110" rx="16" stroke-width="0.5"/>
  <text class="th" x="340" y="345" text-anchor="middle">Tool layer</text>
</g>
<g class="c-coral">
  <rect x="55" y="358" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="107" y="376" text-anchor="middle" dominant-baseline="central">MP API</text>
  <text class="ts" x="107" y="396" text-anchor="middle" dominant-baseline="central">Search + props</text>
</g>
<g class="c-coral">
  <rect x="172" y="358" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="224" y="376" text-anchor="middle" dominant-baseline="central">Script repo</text>
  <text class="ts" x="224" y="396" text-anchor="middle" dominant-baseline="central">DFT templates</text>
</g>
<g class="c-coral">
  <rect x="289" y="358" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="376" text-anchor="middle" dominant-baseline="central">Papers</text>
  <text class="ts" x="341" y="396" text-anchor="middle" dominant-baseline="central">RAG search</text>
</g>
<g class="c-coral">
  <rect x="406" y="358" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="458" y="376" text-anchor="middle" dominant-baseline="central">Doc reader</text>
  <text class="ts" x="458" y="396" text-anchor="middle" dominant-baseline="central">Select + review</text>
</g>
<g class="c-coral">
  <rect x="523" y="358" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="575" y="376" text-anchor="middle" dominant-baseline="central">OpenCode</text>
  <text class="ts" x="575" y="396" text-anchor="middle" dominant-baseline="central">Code exec</text>
</g>

<!-- Arrows: Tools to External -->
<line x1="107" y1="430" x2="107" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="224" y1="430" x2="224" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="341" y1="430" x2="341" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="458" y1="430" x2="458" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="575" y1="430" x2="575" y2="490" class="arr" marker-end="url(#arrow)"/>

<!-- Layer 4: External Systems -->
<g class="c-blue">
  <rect x="55" y="490" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="107" y="510" text-anchor="middle" dominant-baseline="central">MP REST</text>
  <text class="ts" x="107" y="530" text-anchor="middle" dominant-baseline="central">via MCP/Python</text>
</g>
<g class="c-blue">
  <rect x="172" y="490" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="224" y="510" text-anchor="middle" dominant-baseline="central">Git repo</text>
  <text class="ts" x="224" y="530" text-anchor="middle" dominant-baseline="central">Local scripts</text>
</g>
<g class="c-blue">
  <rect x="289" y="490" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="341" y="510" text-anchor="middle" dominant-baseline="central">Vector DB</text>
  <text class="ts" x="341" y="530" text-anchor="middle" dominant-baseline="central">LibSQL + embeds</text>
</g>
<g class="c-blue">
  <rect x="406" y="490" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="458" y="510" text-anchor="middle" dominant-baseline="central">PDF files</text>
  <text class="ts" x="458" y="530" text-anchor="middle" dominant-baseline="central">User docs</text>
</g>
<g class="c-amber">
  <rect x="523" y="490" width="105" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="575" y="510" text-anchor="middle" dominant-baseline="central">Go binary</text>
  <text class="ts" x="575" y="530" text-anchor="middle" dominant-baseline="central">Terminal agent</text>
</g>

<!-- Footer label -->
<text class="ts" x="340" y="590" text-anchor="middle">MAME — MAterials for ME — System architecture</text>
</svg>